name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript tests & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: library-typescript
        run: pnpm exec vitest run --coverage --coverage.provider=v8 --coverage.reporter=cobertura

      - name: Upload coverage
        uses: actions/upload-code-coverage@82c7aee3fb2ad768e00b00a0a8d749c5815085b6 # v1
        with:
          file: library-typescript/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest
          fail-on-error: false

  java:
    name: Java tests & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-root-directory: library-java

      - name: Run tests with coverage
        working-directory: library-java
        run: ./gradlew :lib:jacocoTestReport

      - name: Convert JaCoCo report to Cobertura
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5.5.10
        with:
          reports: library-java/lib/build/reports/jacoco/test/jacocoTestReport.xml
          targetdir: java-coverage
          reporttypes: Cobertura
          sourcedirs: library-java/lib/src/main/java

      - name: Upload coverage
        uses: actions/upload-code-coverage@82c7aee3fb2ad768e00b00a0a8d749c5815085b6 # v1
        with:
          file: java-coverage/Cobertura.xml
          language: Java
          label: code-coverage/jacoco
          fail-on-error: false
